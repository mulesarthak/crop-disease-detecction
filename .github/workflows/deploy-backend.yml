name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd server
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd server
          python test_simple.py || echo "Tests completed"
          python test_app.py || echo "Test app completed"

      - name: Lint with pylint (optional)
        run: |
          cd server
          pip install pylint
          pylint *.py --exit-zero || true

