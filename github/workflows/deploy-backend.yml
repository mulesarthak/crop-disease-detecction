name: Deploy Backend

on:
  push:
    branches:
      - main # Or your default branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          # Add your backend test command here (pytest, etc) if needed

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: user/app:latest
        # To push, set push: true and configure Docker registry credentials.
